<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>IELTS Reading Hub | 雅思阅读工作站</title>
    <style>
        :root { --primary: #2563eb; --accent: #f59e0b; --pdf-red: #e11d48; --success: #22c55e; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; overflow: hidden; }
        
        /* 侧边栏：核心统计与导航 */
        #sidebar { width: 340px; background: #fff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.02); }
        .sidebar-header { padding: 20px; }
        
        /* 累计练习大看板 */
        .stat-card { background: var(--primary); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .stat-label { font-size: 14px; opacity: 0.9; font-weight: 500; }
        .stat-value { font-size: 48px; font-weight: 800; line-height: 1.2; }

        /* 模拟考大按钮 */
        .btn-mock-main { background: var(--accent); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; margin-bottom: 20px; }
        .btn-mock-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3); }

        /* 进度列表 */
        .progress-section { padding: 0 20px; flex: 1; overflow-y: auto; }
        .progress-item { margin-bottom: 15px; color: #64748b; font-size: 14px; }
        .progress-bar-bg { background: #f1f5f9; height: 8px; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .progress-bar-fill { background: var(--primary); height: 100%; transition: 0.5s; }

        /* 清空记录 */
        .footer-actions { padding: 15px; text-align: center; border-top: 1px solid #f1f5f9; }
        .btn-clear { background: none; border: none; color: #cbd5e1; cursor: pointer; font-size: 13px; text-decoration: underline; }
        .btn-clear:hover { color: #ef4444; }

        /* 右侧内容区 */
        #content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content-header { padding: 20px; background: #fff; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .search-box { flex: 1; padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; }
        
        .list-container { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; align-content: start; }
        .item-card { background: #fff; padding: 16px; border-radius: 12px; border: 1px solid #eef2f6; transition: 0.2s; position: relative; }
        .item-card.is-done { border-left: 5px solid var(--success); background: #f0fdf4; }
        .item-title { font-size: 14px; font-weight: 600; color: var(--dark); margin-bottom: 8px; display: block; height: 40px; overflow: hidden; }
        .item-count { font-size: 12px; color: #94a3b8; margin-bottom: 12px; display: flex; align-items: center; gap: 5px; }
        
        .btn-row { display: flex; gap: 8px; }
        .btn-sm { flex: 1; border: none; padding: 8px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-run { background: #eff6ff; color: var(--primary); }
        .btn-pdf { background: #fff1f2; color: var(--pdf-red); }

        /* 考试覆盖层 */
        #exam-overlay { position: fixed; inset: 0; background: #fff; z-index: 9999; display: none; flex-direction: column; }
        .exam-nav { background: #111827; color: white; height: 55px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .timer { font-family: monospace; font-size: 24px; color: #fbbf24; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <div class="stat-card">
            <div class="stat-label">累计练习次数</div>
            <div class="stat-value" id="totalCount">0</div>
        </div>
        <button class="btn-mock-main" onclick="startFullMock()">
            🎲 随机全套 (优先新题)
        </button>
    </div>

    <div class="progress-section" id="progressList">
        </div>

    <div class="footer-actions">
        <button class="btn-clear" onclick="clearHistory()">清空记录</button>
    </div>
</div>

<div id="content-area">
    <div class="content-header">
        <div class="nav-tabs" style="display:flex; gap:10px;">
            <button class="nav-tab active" onclick="switchMode('p1', this)">P1</button>
            <button class="nav-tab" onclick="switchMode('p2', this)">P2</button>
            <button class="nav-tab" onclick="switchMode('p3', this)">P3</button>
        </div>
        <input type="text" id="searchInput" class="search-box" placeholder="搜索文章标题..." oninput="render()">
    </div>
    <div class="list-container" id="listBody"></div>
</div>

<div id="exam-overlay">
    <div class="exam-nav">
        <div id="examTabs" style="display:flex; gap:10px;"></div>
        <div class="timer" id="timer">60:00</div>
        <button onclick="quitExam()" style="background:#ef4444; border:none; color:white; padding:5px 12px; border-radius:5px; cursor:pointer;">退出</button>
    </div>
    <div id="iframe-wrap" style="flex:1; position:relative;"></div>
</div>

<script>
    let rawData = null;
    let currentPart = 'p1';
    let history = JSON.parse(localStorage.getItem('ielts_stats_v2') || '{}');
    let clock;

    // 1. 初始化
    fetch('./data.json')
        .then(r => r.json())
        .then(data => { rawData = data; render(); updateSidebar(); });

    // 2. 核心渲染
    function render() {
        if(!rawData) return;
        const container = document.getElementById('listBody');
        const search = document.getElementById('searchInput').value.toLowerCase();
        container.innerHTML = '';

        rawData[currentPart].filter(i => i.title.toLowerCase().includes(search)).forEach(item => {
            const count = history[item.id] || 0;
            const card = document.createElement('div');
            card.className = `item-card ${count > 0 ? 'is-done' : ''}`;
            
            card.innerHTML = `
                <span class="item-title">${item.title}</span>
                <div class="item-count">📋 已做过: ${count} 次</div>
                <div class="btn-row">
                    <button class="btn-sm btn-run" onclick="launch([${JSON.stringify(item).replace(/"/g, '&quot;')}], false)">机考</button>
                    <button class="btn-sm btn-pdf" onclick="window.open('pdf/')">解析</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // 3. 更新侧边栏统计 (包含进度条)
    function updateSidebar() {
        if(!rawData) return;
        let total = 0;
        const progressContainer = document.getElementById('progressList');
        progressContainer.innerHTML = '';

        ['p1', 'p2', 'p3'].forEach(p => {
            const partData = rawData[p];
            const doneCount = partData.filter(i => history[i.id]).length;
            const percent = Math.round((doneCount / partData.length) * 100);
            total += Object.values(history).length; // 这里改为所有练习总和

            progressContainer.innerHTML += `
                <div class="progress-item">
                    <div style="display:flex; justify-content:space-between">
                        <span>${p.toUpperCase()} 进度</span>
                        <span>${doneCount} / ${partData.length}</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${percent}%"></div>
                    </div>
                </div>
            `;
        });
        
        // 计算练习总次数
        const totalExams = Object.values(history).reduce((a, b) => a + b, 0);
        document.getElementById('totalCount').innerText = totalExams;
    }

    // 4. 随机抽取 (优先新题)
    function startFullMock() {
        const session = [];
        ['p1', 'p2', 'p3'].forEach(p => {
            const pool = rawData[p];
            const unread = pool.filter(i => !history[i.id]);
            const source = unread.length > 0 ? unread : pool;
            session.push(source[Math.floor(Math.random() * source.length)]);
        });
        launch(session, true);
    }

    function launch(items, timed) {
        const tabs = document.getElementById('examTabs');
        const wrap = document.getElementById('iframe-wrap');
        tabs.innerHTML = ''; wrap.innerHTML = '';
        
        items.forEach((item, idx) => {
            history[item.id] = (history[item.id] || 0) + 1; // 记录次数
            
            const b = document.createElement('button');
            b.style = "padding:5px 15px; cursor:pointer; background:#374151; color:white; border:none; border-radius:4px;";
            b.innerText = `P${idx + 1}`;
            b.onclick = () => {
                document.querySelectorAll('iframe').forEach((f, i) => f.style.display = i === idx ? 'block' : 'none');
            };
            tabs.appendChild(b);

            const f = document.createElement('iframe');
            f.src = encodeURI(item.url.replace(/^p(\d)\//, 'P$1/'));
            f.className = idx === 0 ? 'active' : '';
            f.style.display = idx === 0 ? 'block' : 'none';
            wrap.appendChild(f);
        });

        localStorage.setItem('ielts_stats_v2', JSON.stringify(history));
        document.getElementById('exam-overlay').style.display = 'flex';
        if(timed) startClock(3600);
        updateSidebar();
    }

    function switchMode(m, btn) {
        currentPart = m;
        document.querySelectorAll('.nav-tab').forEach(b => b.style.color = '#64748b');
        btn.style.color = 'var(--primary)';
        render();
    }

    function clearHistory() {
        if(confirm("确定清空所有练习记录吗？")) {
            history = {};
            localStorage.setItem('ielts_stats_v2', JSON.stringify(history));
            location.reload();
        }
    }

    function startClock(sec) {
        let left = sec;
        clearInterval(clock);
        clock = setInterval(() => {
            left--;
            let m = Math.floor(left/60).toString().padStart(2,'0');
            let s = (left%60).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${m}:${s}`;
            if(left <= 0) { clearInterval(clock); alert("时间到！"); quitExam(); }
        }, 1000);
    }

    function quitExam() {
        clearInterval(clock);
        document.getElementById('exam-overlay').style.display = 'none';
        render();
        updateSidebar();
    }
</script>
</body>
</html>
